<html lang="zh-CN">

<head>
    <link id="style" rel="stylesheet" href="./file-uploader.css">
    <meta name="gettext" content="translate">
    <c-resources assets="forms/css"></c-resources>
    <meta name="gettext" content="translate">
<meta charset="UTF-8"></head>
<!-- TRANSLATORS: This is the main web form container for the file uploader component -->
<body>
    <main id="fu" gettext-context="File Uploader Component">
        <slot>
            <template>
                <div class="fu-file">
                    <input type="hidden" z-var="fieldName @name, uri =">
                    <img loading="lazy" role="remove-file-confirm" class="fu-object" title="${name} (${sizeHR})" z-var="name @title, sizeHR @title, url @src, type @type">
                    <!-- <div class="fu-file-name" z-var="name .">Name</div>  -->
                    <!-- <div class="fu-file-size" z-var="size .">Size</div> -->
                    <!-- <div class="fu-file-last-modified" z-var="lastModified .">Modified</div> -->
                    <!-- <div class="fu-file-remove" role="remove-file">✖</div> -->
                </div>
            </template>
        </slot>

        <div class="fu-drop-target fu-drop-target-cover">
            <svg xmlns="http://www.w3.org/2000/svg" viewbox="0 0 16 16">
                <path d="M11.8 5.8a.8.8 0 0 1-1 0l-2-2v7.5a.8.8 0 0 1-1.6 0V3.8l-2 2a.8.8 0 0 1-1-1.1l3.3-3.3L8 1l.5.5 3.3 3.3a.8.8 0 0 1 0 1zm-9.3 4a.8.8 0 0 0-1.5 0V13a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9.7a.8.8 0 0 0-1.5 0V13a.5.5 0 0 1-.5.5H3a.5.5 0 0 1-.5-.5V9.7z"></path>
            </svg>
            <!-- TRANSLATORS: This is the instruction for the file uploader component -->
            <span gettext="zolinga-commons:.#fe9d3b">拖放文件至此上传</span>
        </div>

        <div class="fu-drop-target fu-drop-target-inline">
            <input type="file" role="new-file" accept="*/*" multiple>
            <svg xmlns="http://www.w3.org/2000/svg" viewbox="0 0 16 16">
                <path d="M11.8 5.8a.8.8 0 0 1-1 0l-2-2v7.5a.8.8 0 0 1-1.6 0V3.8l-2 2a.8.8 0 0 1-1-1.1l3.3-3.3L8 1l.5.5 3.3 3.3a.8.8 0 0 1 0 1zm-9.3 4a.8.8 0 0 0-1.5 0V13a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9.7a.8.8 0 0 0-1.5 0V13a.5.5 0 0 1-.5.5H3a.5.5 0 0 1-.5-.5V9.7z"></path>
            </svg>
            <!-- TRANSLATORS: This is the instruction for the file uploader component, it should encourage users to click to open file picker dialog or drag and drop files to upload. -->
            <span gettext="zolinga-commons:.#72724d">点击或拖拽文件至此</span>
        </div>

        <div popover id="fu-confirm-removal" gettext-context="file removal confirmation">
            <div gettext="zolinga-commons:.#ab68ff" style="padding-bottom: 1em;">确定要删除此文件吗？</div>
            <!-- TRANSLATORS: This is the button choice for the question "Really remove this file?" [Cancel] [Remove]-->
            <div gettext-context="dialog button">
                <button popovertarget="fu-confirm-removal" class="c-form" gettext="zolinga-commons:.#a2be7f">取消</button>
                <button popovertarget="fu-confirm-removal" role="remove-file" class="c-form primary" gettext="zolinga-commons:.#bf0168" autofocus>移除</button>
            </div>
        </div>

    </main>
</body>

</html>
